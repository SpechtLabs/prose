[tools]
# Toolchain pinned for reproducible local and CI builds. go is the build
# toolchain (>= the go.mod language floor of 1.25); the rest match the versions
# used across the other SpechtLabs repos to keep tooling consistent.
go = "1.26.3"
golangci-lint = "2.12.2"
goreleaser = "2.16.0"
cosign = "3.0.6"
# Sample operators (envtest + Kind e2e) need these.
operator-sdk = "1.42.2"
kind = "0.31.0"
kubectl = "1.36.1"
bun = "latest"

[vars]
envtest_k8s_version = "1.33.0"
setup_envtest = "go run sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.21"

[tasks.fmt]
description = "Format the code"
run = "go fmt ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.test]
description = "Run the fast unit tests (no apiserver needed)"
depends = ["fmt", "vet"]
run = "go test ./..."

[tasks.setup-envtest]
description = "Download the envtest control-plane binaries"
run = "{{vars.setup_envtest}} use {{vars.envtest_k8s_version}} --bin-dir {{config_root}}/bin"

[tasks.test-envtest]
description = "Run the integration tests against a real apiserver"
run = '''
KUBEBUILDER_ASSETS="$({{vars.setup_envtest}} use {{vars.envtest_k8s_version}} --bin-dir {{config_root}}/bin -p path)" \
  go test -tags envtest ./...
'''
