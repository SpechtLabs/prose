# This rule is not used by the project wormhole-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to universe.specht-labs.de resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: wormhole-operator
    app.kubernetes.io/managed-by: kustomize
  name: anchor-viewer-role
rules:
- apiGroups:
  - universe.specht-labs.de
  resources:
  - anchors
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - universe.specht-labs.de
  resources:
  - anchors/status
  verbs:
  - get
