config:
  # Default state for all rules
  default: true

  # MD013: Disable line length rule
  MD013: false
  MD024: false
  MD038: false
  MD060: false

# Include all Markdown files in the project
globs:
  - "**/*.md"

# Ignore node_modules directory and other common patterns
ignores:
  - "docs/node_modules/**"
  - ".git/**"
  - "vendor/**"
  - CHANGELOG.md
  # Example operators are largely operator-sdk-generated; skip them here the same
  # way .yamllint.yaml skips samples/.
  - "samples/**"
