name: Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/docs-website.yaml
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/docs-website.yaml

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (Docs)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # mise provides bun (and everything else) — one install mechanism, in CI too.
      - name: Set up mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Cache bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: docs
          path: docs/.vuepress/dist

  deploy-gh-pages:
    name: Deploy (GitHub Pages)
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    permissions:
      id-token: write
      pages: write
    steps:
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Download Artifacts for Website
        uses: actions/download-artifact@v7
        with:
          name: docs
          path: ./dist

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-static-pages:
    name: Deploy (Specht Labs Pages)
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    permissions:
      id-token: write
      pages: write
    steps:
      - name: Download Artifacts for Website
        uses: actions/download-artifact@v7
        with:
          name: docs
          path: ./dist

      - name: Upload to Static Pages
        uses: SpechtLabs/StaticPages-Upload@main
        with:
          endpoint: https://pages.specht-labs.de
          site-dir: dist/
